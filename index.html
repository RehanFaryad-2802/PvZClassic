    <style>
      /* Block ALL screens until fonts + scripts ready */
      body { visibility: hidden; }
      #screen-loading {
        visibility: visible;
        position: fixed;
        inset: 0;
        background: #0a0010;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        gap: 24px;
      }
      #screen-loading .ld-logo {
        font-size: 52px;
        font-weight: 900;
        letter-spacing: 2px;
        color: #fff;
        text-shadow: 0 0 30px #a855f7, 0 0 60px #7c3aed;
        font-family: sans-serif;
      }
      #screen-loading .ld-logo span { color: #a855f7; }
      #screen-loading .ld-sub {
        color: #a78bfa;
        font-size: 14px;
        font-family: sans-serif;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      #screen-loading .ld-bar-wrap {
        width: 220px;
        height: 8px;
        background: #1e1035;
        border-radius: 99px;
        overflow: hidden;
        border: 1px solid #4c1d95;
      }
      #screen-loading .ld-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #7c3aed, #a855f7, #ec4899);
        border-radius: 99px;
        transition: width 0.3s ease;
        box-shadow: 0 0 10px #a855f7;
      }
      #screen-loading .ld-tip {
        color: #6b21a8;
        font-size: 12px;
        font-family: sans-serif;
        max-width: 260px;
        text-align: center;
        min-height: 32px;
      }
    </style>

    <script>
      // Boot
      window.addEventListener("DOMContentLoaded", () => {
        const bar = document.getElementById("ld-bar");
        const tip = document.getElementById("ld-tip");
        const tips = [
          "Watering your plants...",
          "Summoning demons...",
          "Loading worlds...",
          "Sharpening thorns...",
          "Ready to battle!",
        ];
        let progress = 0;

        function setProgress(pct, msg) {
          if (bar) bar.style.width = pct + "%";
          if (tip && msg) tip.textContent = msg;
        }

        // Animate progress while fonts + everything loads
        setProgress(10, tips[0]);
        setTimeout(() => setProgress(30, tips[1]), 600);
        setTimeout(() => setProgress(55, tips[2]), 1200);
        setTimeout(() => setProgress(75, tips[3]), 1800);

        // Wait for fonts to finish loading, then boot
        const ready = () => {
          setProgress(100, tips[4]);
          setTimeout(() => {
            // Make body visible now that fonts are ready
            document.body.style.visibility = "visible";
            // Fade out loading screen
            const ld = document.getElementById("screen-loading");
            if (ld) {
              ld.style.transition = "opacity 0.4s ease";
              ld.style.opacity = "0";
              setTimeout(() => ld.remove(), 400);
            }
            UI.init();
          }, 300);
        };

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(() => setTimeout(ready, 2200));
        } else {
          setTimeout(ready, 2800);
        }

        // Fix mobile touch for name entry button
        const startBtn = document.getElementById("btn-start-game");
        if (startBtn) {
          startBtn.addEventListener(
            "touchend",
            (e) => {
              e.preventDefault();
              startBtn.click();
            },
            { passive: false },
          );
        }

        // Fix all buttons for mobile touch
        document.addEventListener(
          "touchend",
          (e) => {
            const btn = e.target.closest(
              "button, .btn-menu, .btn-primary, .btn-secondary, .btn-back",
            );
            if (btn) {
              e.preventDefault();
              btn.click();
            }
          },
          { passive: false },
        );
      });

      // World map toolbar shortcuts
      document.getElementById("btn-wm-minigames")?.addEventListener("click", () => UI.showScreen("screen-minigames"));
      document.getElementById("btn-wm-inventory")?.addEventListener("click", () => UI.showScreen("screen-collection"));

      // Service worker for offline/APK
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }
      // Prevent context menu on long press
      window.addEventListener("contextmenu", (e) => e.preventDefault());
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(() => {});
      }
      // Prevent pull-to-refresh
      document.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches.length > 1) e.preventDefault();
        },
        { passive: false },
      );
    </script>
  </body>
</html>
